name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below as completely as possible.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Ingest pipeline (sync/import)
        - A specific data source (name it below)
        - Database / schema
        - GraphQL / Hasura
        - Docker / Compose
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Data source (if applicable)
      placeholder: "e.g. redhat, ubuntu, ghsa"

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. docker compose run --rm ingest sync ...
        2. docker compose run --rm ingest import ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      description: Paste any error output here.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
