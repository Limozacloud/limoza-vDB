name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for limoza-vDB? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the feature do? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or alternative approaches you considered.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - New data source
        - Existing data source (mapping/coverage)
        - Schema / LVE record
        - GraphQL / Hasura API
        - Ingest pipeline / CLI
        - Docker / deployment
        - Documentation
        - CI / Build
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
