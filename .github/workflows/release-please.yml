name: Release Please

on:
  workflow_dispatch:
    inputs:
      publish_tag:
        description: 'Existing tag to build & push the image for (e.g. v0.1.1). Leave empty for a normal release run.'
        required: false
        default: ''
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Builds and pushes the image in the SAME run as the release (or via manual dispatch).
  # A release created by release-please uses GITHUB_TOKEN, which does NOT trigger a
  # separate `on: release` workflow — so the publish lives here instead.
  publish-image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_tag != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TAG: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_tag != '' && github.event.inputs.publish_tag) || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Compute version
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/limozacloud/limoza-vdb
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Docker metadata (mcp)
        id: meta_mcp
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/limozacloud/limoza-vdb-mcp
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - name: Build and push (mcp)
        uses: docker/build-push-action@v6
        with:
          context: ./mcp-server
          push: true
          tags: ${{ steps.meta_mcp.outputs.tags }}
          labels: ${{ steps.meta_mcp.outputs.labels }}
