name: CI

# Runs on pull requests only — intentionally not on push, so each change is
# checked exactly once (no duplicate runs for branch push + PR).
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff==0.15.17

      - name: Ruff check
        run: ruff check .

  docs:
    name: Docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict
