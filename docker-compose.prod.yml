# ── Production stack ──────────────────────────────────────────────────────────
# Pre-built images from GHCR, TLS via Traefik, no exposed database, no pgAdmin,
# Hasura console disabled. The daily scheduler runs the full pipeline.
# Requires an external `traefik` network and DNS for the *.limoza.cloud hosts.
services:
  postgres:
    container_name: limoza-vdb-postgres
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ingest:
    container_name: limoza-vdb-ingest
    image: ghcr.io/limozacloud/limoza-vdb:latest
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - epss:/data/epss
      - kev:/data/kev
      - ssvc:/data/ssvc
      - cna:/data/cna
      - cpe:/data/cpe
      - cwe:/data/cwe
      - cvelistv5:/data/cvelistv5
      - redhat:/data/redhat
      - suse:/data/suse
      - ubuntu:/data/ubuntu
      - debian:/data/debian
      - oracle:/data/oracle
      - almalinux:/data/almalinux
      - rocky:/data/rocky
      - microsoft:/data/microsoft
      - ghsa:/data/ghsa
      - osv:/data/osv
      - exploitdb:/data/exploitdb
      - metasploit:/data/metasploit
      - nuclei:/data/nuclei
      - poc_github:/data/poc_github
    depends_on:
      - postgres
    restart: unless-stopped

  hasura:
    container_name: limoza-vdb-hasura
    image: ghcr.io/mchill007/graphql-engine:v2.49.1-custom.2
    env_file: .env
    environment:
      HASURA_GRAPHQL_DATABASE_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "false"
      HASURA_GRAPHQL_ADMIN_SECRET:   ${HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_JWT_SECRET:     '{"type":"HS256","key":"${HASURA_JWT_SECRET}"}'
    depends_on:
      - postgres
    restart: unless-stopped
    networks: [default, traefik]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.vdb.rule=Host(`vdb.limoza.cloud`)"
      - "traefik.http.routers.vdb.entrypoints=websecure"
      - "traefik.http.routers.vdb.tls.certresolver=myresolver"
      - "traefik.http.services.vdb.loadbalancer.server.port=8080"

  mcp:
    container_name: limoza-vdb-mcp
    image: ghcr.io/limozacloud/limoza-vdb-mcp:latest
    env_file: .env
    environment:
      GRAPHQL_URL:       http://hasura:8080/v1/graphql
      HASURA_JWT_SECRET: ${HASURA_JWT_SECRET}
    depends_on:
      - hasura
    restart: unless-stopped
    networks: [default, traefik]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.vdb-mcp.rule=Host(`vdb-mcp.limoza.cloud`)"
      - "traefik.http.routers.vdb-mcp.entrypoints=websecure"
      - "traefik.http.routers.vdb-mcp.tls.certresolver=myresolver"
      - "traefik.http.services.vdb-mcp.loadbalancer.server.port=8765"

  ofelia:
    container_name: limoza-vdb-ofelia
    image: mcuadros/ofelia:latest
    depends_on:
      - ingest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/ofelia.ini:/etc/ofelia/config.ini:ro
    command: daemon --config=/etc/ofelia/config.ini
    restart: unless-stopped

volumes:
  postgres_data:
  epss: {}
  kev: {}
  ssvc: {}
  cna: {}
  cpe: {}
  cwe: {}
  cvelistv5: {}
  redhat: {}
  suse: {}
  ubuntu: {}
  debian: {}
  oracle: {}
  almalinux: {}
  rocky: {}
  microsoft: {}
  ghsa: {}
  osv: {}
  exploitdb: {}
  metasploit: {}
  nuclei: {}
  poc_github: {}

networks:
  traefik:
    external: true
