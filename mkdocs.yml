site_name: limoza-vDB
site_description: Multi-vendor CVE / vulnerability aggregation system
site_url: https://limozacloud.github.io/limoza-vDB/
repo_url: https://github.com/Limozacloud/limoza-vDB
repo_name: Limozacloud/limoza-vDB

theme:
  name: readthedocs

extra_css:
  - css/extra.css

nav:
  - Home: index.md
  - Running limoza-vDB:
    - Docker stack: running/docker.md
    - Ingest CLI: running/cli.md
    - GraphQL & Hasura: running/graphql.md
    - MCP server: running/mcp.md
  - Pipeline:
    - Overview: ingest/index.md
    - LVE Schema: ingest/schema.md
  - Data Sources:
    - Overview: datasources/index.md
    - Linux distributions:
      - Red Hat: datasources/redhat.md
      - SUSE: datasources/suse.md
      - Ubuntu: datasources/ubuntu.md
      - Debian: datasources/debian.md
      - Alpine: datasources/alpine.md
      - AlmaLinux: datasources/almalinux.md
      - Rocky Linux: datasources/rocky.md
      - Oracle Linux: datasources/oracle.md
    - OS / vendor:
      - Microsoft MSRC: datasources/microsoft.md
    - CVE baseline:
      - NVD / MITRE: datasources/nvd.md
    - Package ecosystems:
      - GitHub Advisories: datasources/ghsa.md
      - OSV: datasources/osv.md
    - Risk scoring:
      - EPSS: datasources/epss.md
      - CISA KEV: datasources/cisa-kev.md
      - CISA SSVC: datasources/cisa-ssvc.md
      - BSI WID: datasources/bsi.md
    - Exploit intelligence:
      - Exploit-DB: datasources/exploitdb.md
      - Metasploit: datasources/metasploit.md
      - Nuclei: datasources/nuclei.md
      - PoC-in-GitHub: datasources/poc-github.md
    - Reference dictionaries:
      - NVD CPE: datasources/cpe.md
      - CWE: datasources/cwe.md
  - Reference:
    - Documentation conventions: datasource_blueprint.md
    - GraphQL example queries: graphql-example-queries.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - admonition
  - tables
  - attr_list
