# ── Development stack ─────────────────────────────────────────────────────────
# Builds the images locally, exposes ports on localhost, includes pgAdmin and the
# daily scheduler. For production use docker-compose.prod.yml (pre-built images + TLS).
services:
  postgres:
    container_name: limoza-vdb-postgres
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ingest:
    container_name: limoza-vdb-ingest
    build: .
    image: limoza-vdb-ingest
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - epss:/data/epss
      - kev:/data/kev
      - ssvc:/data/ssvc
      - cna:/data/cna
      - cpe:/data/cpe
      - cwe:/data/cwe
      - cvelistv5:/data/cvelistv5
      - redhat:/data/redhat
      - suse:/data/suse
      - ubuntu:/data/ubuntu
      - debian:/data/debian
      - oracle:/data/oracle
      - almalinux:/data/almalinux
      - rocky:/data/rocky
      - microsoft:/data/microsoft
      - ghsa:/data/ghsa
      - osv:/data/osv
      - exploitdb:/data/exploitdb
      - metasploit:/data/metasploit
      - nuclei:/data/nuclei
      - poc_github:/data/poc_github
    depends_on:
      - postgres
    restart: unless-stopped

  hasura:
    container_name: limoza-vdb-hasura
    image: ghcr.io/mchill007/graphql-engine:v2.49.1-custom.2
    env_file: .env
    environment:
      HASURA_GRAPHQL_DATABASE_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET:   ${HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_JWT_SECRET:     '{"type":"HS256","key":"${HASURA_JWT_SECRET}"}'
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  mcp:
    container_name: limoza-vdb-mcp
    build: ./mcp-server
    env_file: .env
    environment:
      GRAPHQL_URL:       http://hasura:8080/v1/graphql
      HASURA_JWT_SECRET: ${HASURA_JWT_SECRET}
    ports:
      - "8765:8765"
    depends_on:
      - hasura
    restart: unless-stopped

  api:
    container_name: limoza-vdb-api
    build: .
    image: limoza-vdb-ingest
    env_file: .env
    environment:
      POSTGRES_DSN:      postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HASURA_JWT_SECRET: ${HASURA_JWT_SECRET}
      API_PORT:          "8770"
    command: api
    ports:
      - "8770:8770"
    depends_on:
      - postgres
    restart: unless-stopped

  ofelia:
    container_name: limoza-vdb-ofelia
    image: mcuadros/ofelia:latest
    depends_on:
      - ingest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/ofelia.ini:/etc/ofelia/config.ini:ro
    command: daemon --config=/etc/ofelia/config.ini
    restart: unless-stopped

  pgadmin:
    container_name: limoza-vdb-pgadmin
    image: dpage/pgadmin4:latest
    env_file: .env
    environment:
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  epss: {}
  kev: {}
  ssvc: {}
  cna: {}
  cpe: {}
  cwe: {}
  cvelistv5: {}
  redhat: {}
  suse: {}
  ubuntu: {}
  debian: {}
  oracle: {}
  almalinux: {}
  rocky: {}
  microsoft: {}
  ghsa: {}
  osv: {}
  exploitdb: {}
  metasploit: {}
  nuclei: {}
  poc_github: {}
