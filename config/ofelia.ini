; ──────────────────────────────────────────────────────────────────────────────
; Ofelia schedule — limoza-vDB
;
; Runs the full pipeline once a day inside the already-running ingest container,
; in order:  schema → sync → ingest → affected → hasura-init   (all idempotent).
; At 05:00 (server time / UTC) — after the upstream CVE List refresh (~03:00).
;
; After `compose up` the first run happens at the next scheduled time; to populate
; immediately, run the same command once by hand:
;   docker compose exec ingest sh -c "vdb schema && vdb sync && vdb ingest && vdb affected && vdb hasura-init"
;
; Edit & apply:  docker compose restart ofelia
; job-exec runs inside the existing ingest container — no extra volumes/env needed.
; ──────────────────────────────────────────────────────────────────────────────

[job-exec "daily"]
schedule   = 0 0 5 * * *
container  = limoza-vdb-ingest
command    = sh -c "vdb schema && vdb sync && vdb ingest && vdb affected && vdb hasura-init"
no-overlap = true
