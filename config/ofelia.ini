; ──────────────────────────────────────────────────────────────────────────────
; Ofelia schedule — limoza-vDB
;
; Runs the full pipeline once a day inside the already-running ingest container:
; `vdb daily` = schema → sync → ingest → affected → hasura-init (all idempotent).
; At 05:00 (server time / UTC) — after the upstream CVE List refresh (~03:00).
;
; NOTE: the command must be a SINGLE token-list — ofelia splits `command` on spaces
; and does NOT shell-parse it, so `sh -c "a && b"` breaks (quotes/&& mangled). The
; whole pipeline therefore lives in the `vdb daily` subcommand.
;
; First run after `compose up` happens at the next scheduled time; to populate now:
;   docker compose exec ingest vdb daily
;
; Edit & apply:  docker compose restart ofelia
; ──────────────────────────────────────────────────────────────────────────────

[job-exec "daily"]
schedule   = 0 0 5 * * *
container  = limoza-vdb-ingest
command    = vdb daily
no-overlap = true
