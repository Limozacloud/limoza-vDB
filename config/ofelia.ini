; ──────────────────────────────────────────────────────────────────────────────
; Ofelia schedule — limoza-vDB
;
; Cron syntax:  minute  hour  day  month  weekday
; Manual run:   docker compose run --rm ingest pipeline daily
; Edit & apply: docker compose restart ofelia
; ──────────────────────────────────────────────────────────────────────────────

[job-run "daily"]
schedule    = 30 2 * * *
image       = limoza-vdb-ingest
command     = pipeline daily
network     = limoza-vdb_default
no-overlap  = true
delete      = true
volume      = /opt/docker/limoza/limoza-vDB/.env:/config/.env:ro
volume      = /opt/docker/limoza/limoza-vDB/config/schedule.json:/config/schedule.json:ro
volume      = limoza-vdb_nvd_github:/data/nvd-github
volume      = limoza-vdb_redhat:/data/redhat
volume      = limoza-vdb_suse_vex:/data/suse-vex
volume      = limoza-vdb_epss:/data/epss
volume      = limoza-vdb_cisa_ssvc:/data/cisa-ssvc
volume      = limoza-vdb_bsi:/data/bsi
volume      = limoza-vdb_cisa_kev:/data/cisa-kev
volume      = limoza-vdb_nuclei:/data/nuclei
volume      = limoza-vdb_ubuntu_usn:/data/ubuntu-usn
volume      = limoza-vdb_oracle_oval:/data/oracle-oval
volume      = limoza-vdb_debian_tracker:/data/debian-tracker
volume      = limoza-vdb_alpine_secdb:/data/alpine-secdb
volume      = limoza-vdb_almalinux_errata:/data/almalinux-errata
volume      = limoza-vdb_rocky_errata:/data/rocky-errata
volume      = limoza-vdb_msrc:/data/msrc
volume      = limoza-vdb_exploitdb:/data/exploitdb
volume      = limoza-vdb_poc_github:/data/poc-github
volume      = limoza-vdb_ghsa:/data/ghsa
volume      = limoza-vdb_metasploit:/data/metasploit
volume      = limoza-vdb_osv:/data/osv
environment = PYTHONUNBUFFERED=1
environment = SCHEDULE_CONFIG=/config/schedule.json
environment = NVD_GITHUB_DIR=/data/nvd-github
environment = REDHAT_DIR=/data/redhat
environment = SUSE_VEX_DIR=/data/suse-vex
environment = EPSS_DIR=/data/epss
environment = CISA_SSVC_DIR=/data/cisa-ssvc
environment = BSI_DIR=/data/bsi
environment = CISA_KEV_DIR=/data/cisa-kev
environment = NUCLEI_DIR=/data/nuclei
environment = UBUNTU_USN_DIR=/data/ubuntu-usn
environment = ORACLE_OVAL_DIR=/data/oracle-oval
environment = DEBIAN_TRACKER_DIR=/data/debian-tracker
environment = ALPINE_SECDB_DIR=/data/alpine-secdb
environment = ALMALINUX_ERRATA_DIR=/data/almalinux-errata
environment = ROCKY_ERRATA_DIR=/data/rocky-errata
environment = MSRC_DIR=/data/msrc
environment = EXPLOITDB_DIR=/data/exploitdb
environment = POC_GITHUB_DIR=/data/poc-github
environment = GHSA_DIR=/data/ghsa
environment = METASPLOIT_DIR=/data/metasploit
environment = OSV_DIR=/data/osv
