; ──────────────────────────────────────────────────────────────────────────────
; Ofelia schedule — cve-ingest
;
; Cron syntax:  minute  hour  day  month  weekday
; Specials:     @daily = 0 0 * * *    @weekly = 0 0 * * 0
;
; Jobs are defined in config/schedule.json
; Edit this file and run: docker compose restart ofelia
; Manual run:             docker compose run --rm ingest pipeline daily
; ──────────────────────────────────────────────────────────────────────────────

[job-run "daily"]
schedule   = 0 1 * * *
container  = cve-ingest-ingest-1
command    = pipeline daily
no-overlap = true

; ──────────────────────────────────────────────────────────────────────────────
; Uncomment to enable weekly job (Sunday 03:00)
; ──────────────────────────────────────────────────────────────────────────────
; [job-run "weekly"]
; schedule   = 0 3 * * 0
; container  = cve-ingest-ingest-1
; command    = pipeline weekly
; no-overlap = true
