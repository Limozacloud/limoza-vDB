; ──────────────────────────────────────────────────────────────────────────────
; Ofelia schedule — limoza-vDB
;
; Cron syntax:  minute  hour  day  month  weekday
; Manual run:   docker compose exec ingest pipeline daily
; Edit & apply: docker compose restart ofelia
;
; job-exec runs commands inside the already-running ingest container —
; no extra volumes or env vars needed here.
; ──────────────────────────────────────────────────────────────────────────────

[job-exec "daily"]
schedule   = 30 2 * * *
container  = limoza-vdb-ingest
command    = /entrypoint.sh pipeline daily
no-overlap = true
